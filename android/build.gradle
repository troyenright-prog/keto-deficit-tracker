// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {

    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

subprojects {
    // The Health Connect plugin ships with Kotlin 1.8.20, which can't resolve the
    // default JVM target under this AGP/JDK toolchain. Pin it to 17 so the module
    // compiles. (Same workaround the LiFT app uses.)
    afterEvaluate {
        if (project.name == 'kiwi-health-capacitor-health-connect') {
            android.kotlinOptions {
                jvmTarget = "17"
            }
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
