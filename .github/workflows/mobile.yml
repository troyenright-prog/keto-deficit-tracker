name: Mobile Release

# Builds the Android APK from the production branch and distributes it through
# Firebase App Distribution, which emails the configured testers when the update
# is ready to install.
#
# Required repo secrets:
#   PROD_DOTENV                         Full production .env contents.
#   FIREBASE_SERVICE_ACCOUNT             Service account JSON with Firebase App Distribution Admin.
#   FIREBASE_APP_DISTRIBUTION_APP_ID     Firebase Android app id for com.ketodeficit.tracker.
#   FIREBASE_TESTERS                     Comma-separated tester emails.
#   ANDROID_KEYSTORE_BASE64              Base64 release keystore.
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - 'src/__tests__/**'
  workflow_dispatch:

jobs:
  build-distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # This workflow triggers on the same push as deploy.yml (Test, Version
      # and Deploy) and runs in parallel with it, not after it - so this
      # checkout normally lands on the PRE-bump commit, before deploy.yml's
      # own "npm version" step has run. Building here as-is would bake the
      # old version into both build.gradle AND the web assets' __APP_VERSION__
      # (the in-app "Settings > App version" display), which is exactly what
      # produced a stale v1.0.0 release-notes email for a v1.1.0 release.
      # Waiting for deploy.yml to actually finish, then resetting to its
      # result, guarantees this build always uses the real released version -
      # for a manual workflow_dispatch run (usually well after a deploy
      # already succeeded) this resolves immediately with no wait.
      - name: Wait for the version bump from Test, Version and Deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 30); do
            INFO=$(gh run list --workflow="Test, Version and Deploy" --commit "${{ github.sha }}" --json status,conclusion --jq '.[0] // {}')
            STATUS=$(echo "$INFO" | jq -r '.status // "pending"')
            CONCLUSION=$(echo "$INFO" | jq -r '.conclusion // ""')
            echo "deploy.yml status=$STATUS conclusion=$CONCLUSION (attempt $i)"
            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" != "success" ]; then
                echo "::error::deploy.yml did not succeed for this commit ($CONCLUSION) - skipping the mobile release."
                exit 1
              fi
              break
            fi
            if [ "$i" = "30" ]; then
              echo "::error::Timed out waiting for deploy.yml to finish."
              exit 1
            fi
            sleep 10
          done
          git fetch origin master
          git reset --hard origin/master

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Write production env
        env:
          PROD_DOTENV: ${{ secrets.PROD_DOTENV }}
        run: |
          test -n "$PROD_DOTENV" || (echo "::error::PROD_DOTENV is not set" && exit 1)
          printf '%s\n' "$PROD_DOTENV" > .env

      - name: Build web assets
        run: npm run build

      - name: Derive Android release version
        id: ver
        run: |
          NAME=$(node -p "require('./package.json').version")
          CODE=$(date -u +%y%j%H%M)
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Android versionName=$NAME versionCode=$CODE"

      - name: Inject version into build.gradle
        run: |
          sed -i -E "s/versionCode [0-9]+/versionCode ${{ steps.ver.outputs.code }}/" android/app/build.gradle
          sed -i -E "s/versionName \"[^\"]*\"/versionName \"${{ steps.ver.outputs.name }}\"/" android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set." && exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Distribute to testers
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_DISTRIBUTION_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          testers: ${{ secrets.FIREBASE_TESTERS }}
          releaseNotes: "v${{ steps.ver.outputs.name }} (${{ github.sha }})"
          file: android/app/build/outputs/apk/release/app-release.apk
