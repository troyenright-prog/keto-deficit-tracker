name: Test, Version & Deploy

on:
  push:
    branches: [master]

# Prevent concurrent deploys
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push version bump + tag

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use PAT so the version-bump push triggers no new workflow run
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Configure git for version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        run: npm version patch -m "chore: release v%s [skip ci]"

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name keto-deficit-tracker --commit-dirty=true

      - name: Push version tag back to GitHub
        run: git push --follow-tags
