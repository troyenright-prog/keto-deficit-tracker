name: Test, Version and Deploy

on:
  push:
    branches: [master]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          # Matches mobile.yml so both pipelines build the web assets on the
          # same Node line (20 hits end-of-life April 2026).
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Write production env
        env:
          PROD_DOTENV: ${{ secrets.PROD_DOTENV }}
        run: |
          test -n "$PROD_DOTENV" || (echo "::error::PROD_DOTENV is not set" && exit 1)
          printf '%s\n' "$PROD_DOTENV" > .env

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Bump type is derived from the commit message(s) since the last release
      # tag (fix:/chore: -> patch, feat: -> minor, a breaking-change marker ->
      # major), and patch rolls into a minor bump once it hits the cap - see
      # scripts/version-bump.mjs - so the version stays meaningful instead of
      # climbing forever under an unchanging major.minor.
      - name: Compute next version
        id: next_version
        run: |
          NEXT_VERSION=$(node scripts/version-bump.mjs)
          echo "Next version: $NEXT_VERSION"
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump version
        run: |
          npm version "${{ steps.next_version.outputs.version }}" -m "chore: release v%s [skip ci]"

      # Push the release commit/tag before deploying, so the artifact we deploy
      # always corresponds to a commit that is durably on master. Deploying
      # first (the previous order) could leave production running code whose
      # commit never made it to the remote if the push step failed afterwards.
      - name: Push version tag
        run: git push --follow-tags

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name keto-deficit-tracker --commit-dirty=true
